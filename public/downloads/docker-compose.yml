# Catalyst Studio v0.1.0 — 2026-04-17 07:51

services:
  postgres:
    image: postgres:14-alpine
    container_name: catalyst-postgres
    environment:
      POSTGRES_DB: camunda7
      POSTGRES_USER: admin
      POSTGRES_PASSWORD: catalyst-admin
      TZ: ${TZ:-UTC}
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./init-multi-db.sh:/docker-entrypoint-initdb.d/init-multi-db.sh:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U admin -d camunda7"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - catalyst-network
    restart: unless-stopped

  catalyst-camunda7:
    image: alainjaques22/catalyst-camunda:latest
    container_name: catalyst-camunda7
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      - WAIT_FOR=postgres:5432
      - SPRING_DATASOURCE_URL=jdbc:postgresql://postgres:5432/camunda7
      - SPRING_DATASOURCE_USERNAME=admin
      - SPRING_DATASOURCE_PASSWORD=catalyst-admin
      - TZ=${TZ:-UTC}
      - CATALYST_DEBUG=${CATALYST_DEBUG:-}
      - CATALYST_SECRETS_SOURCE=env
      # --- Connector API keys (set values in .env file — see .env.example) ---
      - ANTHROPIC_API_KEY=${ANTHROPIC_API_KEY:-}
      - OPENAI_API_KEY=${OPENAI_API_KEY:-}
      - XAI_API_KEY=${XAI_API_KEY:-}
      - AZURE_OPENAI_API_KEY=${AZURE_OPENAI_API_KEY:-}
      - GROQ_API_KEY=${GROQ_API_KEY:-}
      - PERPLEXITY_API_KEY=${PERPLEXITY_API_KEY:-}
      - DEEPSEEK_API_KEY=${DEEPSEEK_API_KEY:-}
      - GEMINI_API_KEY=${GEMINI_API_KEY:-}
      - FIREWORKS_API_KEY=${FIREWORKS_API_KEY:-}
      - TOGETHER_API_KEY=${TOGETHER_API_KEY:-}
      - MISTRAL_API_KEY=${MISTRAL_API_KEY:-}
      - COMPATIBLE_API_KEY=${COMPATIBLE_API_KEY:-}
      - SENDGRID_API_KEY=${SENDGRID_API_KEY:-}
      - SLACK_BOT_TOKEN=${SLACK_BOT_TOKEN:-}
      - JIRA_AUTH=${JIRA_AUTH:-}
    volumes:
      - camunda_logs:/camunda/logs
    networks:
      catalyst-network:
        aliases:
          - engine
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/engine-rest/engine"]
      interval: 5s
      timeout: 3s
      retries: 12
      start_period: 30s
    restart: unless-stopped

  catalyst-operaton:
    image: alainjaques22/catalyst-operaton:latest
    container_name: catalyst-operaton
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      - WAIT_FOR=postgres:5432
      - SPRING_DATASOURCE_URL=jdbc:postgresql://postgres:5432/operaton
      - SPRING_DATASOURCE_USERNAME=admin
      - SPRING_DATASOURCE_PASSWORD=catalyst-admin
      - SPRING_DATASOURCE_DRIVER_CLASS_NAME=org.postgresql.Driver
      - TZ=${TZ:-UTC}
      - CATALYST_DEBUG=${CATALYST_DEBUG:-}
      - CATALYST_SECRETS_SOURCE=env
      # --- Connector API keys (set values in .env file — see .env.example) ---
      - ANTHROPIC_API_KEY=${ANTHROPIC_API_KEY:-}
      - OPENAI_API_KEY=${OPENAI_API_KEY:-}
      - XAI_API_KEY=${XAI_API_KEY:-}
      - AZURE_OPENAI_API_KEY=${AZURE_OPENAI_API_KEY:-}
      - GROQ_API_KEY=${GROQ_API_KEY:-}
      - PERPLEXITY_API_KEY=${PERPLEXITY_API_KEY:-}
      - DEEPSEEK_API_KEY=${DEEPSEEK_API_KEY:-}
      - GEMINI_API_KEY=${GEMINI_API_KEY:-}
      - FIREWORKS_API_KEY=${FIREWORKS_API_KEY:-}
      - TOGETHER_API_KEY=${TOGETHER_API_KEY:-}
      - MISTRAL_API_KEY=${MISTRAL_API_KEY:-}
      - COMPATIBLE_API_KEY=${COMPATIBLE_API_KEY:-}
      - SENDGRID_API_KEY=${SENDGRID_API_KEY:-}
      - SLACK_BOT_TOKEN=${SLACK_BOT_TOKEN:-}
      - JIRA_AUTH=${JIRA_AUTH:-}
    volumes:
      - operaton_logs:/operaton/logs
    networks:
      catalyst-network:
        aliases:
          - engine
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/engine-rest/engine"]
      interval: 5s
      timeout: 3s
      retries: 12
      start_period: 30s
    restart: unless-stopped

  modeler:
    image: alainjaques22/catalyst-modeler:latest
    container_name: catalyst-modeler
    environment:
      - NODE_ENV=production
      - PORT=3000
      - BPMN_DIR=/app/bpmn-files
      - CONNECTORS_DIR=/app/connectors
      - CAMUNDA_API_URL=http://engine:8080/engine-rest
      - TZ=${TZ:-UTC}
    networks:
      - catalyst-network
    restart: unless-stopped

  studio-backend:
    image: alainjaques22/catalyst-studio-backend:latest
    container_name: catalyst-studio-backend
    environment:
      - NODE_ENV=production
      - TZ=${TZ:-UTC}
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
      - ./catalyst.config.json:/app/catalyst.config.json:rw
    networks:
      - catalyst-network
    restart: unless-stopped

  caddy:
    image: alainjaques22/catalyst-studio:latest
    container_name: catalyst-caddy
    ports:
      - "80:80"
    volumes:
      - camunda_logs:/usr/share/caddy/camunda-logs:ro
    depends_on:
      - catalyst-camunda7
      - modeler
      - dozzle
    networks:
      - catalyst-network
    restart: unless-stopped

  dozzle:
    image: amir20/dozzle:latest
    container_name: catalyst-dozzle
    environment:
      - DOZZLE_NO_ANALYTICS=true
      - DOZZLE_BASE=/logs
    ports:
      - "8888:8080"
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
    networks:
      - catalyst-network
    restart: unless-stopped

  pgweb:
    image: sosedoff/pgweb
    container_name: catalyst-pgweb
    ports:
      - "8085:8081"
    environment:
      - PGWEB_DATABASE_URL=postgres://admin:catalyst-admin@postgres:5432/camunda7?sslmode=disable
      - PGWEB_URL_PREFIX=pgweb
    depends_on:
      - postgres
    networks:
      - catalyst-network
    restart: unless-stopped

  portainer:
    image: portainer/portainer-ce:latest
    container_name: catalyst-portainer
    # Default credentials — username: admin, password: catalyst-admin
    command: --admin-password='$$2b$$12$$s9wdVNOfx/wXj4w2fzWq/eENWOuuTrNO4iajFlKf58Si3XNvu71dG'
    ports:
      - "9000:9000"
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
      - portainer_data:/data
    networks:
      - catalyst-network
    restart: unless-stopped

volumes:
  postgres_data:
  camunda_logs:
  operaton_logs:
  portainer_data:

networks:
  catalyst-network:
    driver: bridge
